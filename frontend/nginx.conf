server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Security headers. Adjust `connect-src` to your actual API origin (VITE_API_URL) —
    # this default only allows same-origin XHR/fetch, which is wrong for a separately-hosted
    # backend. `style-src 'unsafe-inline'` is required because the app renders a meaningful
    # amount of dynamic inline `style={{...}}` (Framer Motion transforms, chart bar widths,
    # radial-progress stroke-dashoffset) — tightening this would break those, not just look worse.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; frame-ancestors 'none'" always;

    # Hashed build assets (JS/CSS chunks) are content-addressed by Vite — safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html must always be revalidated, or deploys won't take effect for existing visitors.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: any path not matching a real file resolves to index.html so
    # React Router can handle client-side routes like /employees, /payroll, etc.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
